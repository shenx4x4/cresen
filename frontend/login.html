<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cresen - Login</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="cresen-card">
        <div class="header">
            <h2>Cresen Auth</h2>
            <p>Masuk untuk lanjut ke marketplace</p>
        </div>

        <form id="loginForm">
            <div class="input-group">
                <label for="username">Username</label>
                <input type="text" id="username" placeholder="Masukkan username" required autocomplete="off">
            </div>

            <div class="input-group">
                <label for="password">Password</label>
                <input type="password" id="password" placeholder="Masukkan password" required>
            </div>

            <button type="submit" class="btn">Login</button>
        </form>

        <div class="link-text">
            Belum punya akun? <a href="register.html">Daftar sekarang</a>
        </div>
    </div>

    <script src="js/app.js"></script>
</body>
</html>
