<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cresen - Register</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="cresen-card">
        <h2>Create Account</h2>
        <form id="registerForm">
            <div class="input-group">
                <label>Username</label>
                <input type="text" id="reg-username" required autocomplete="off">
            </div>
            <div class="input-group">
                <label>Email</label>
                <input type="email" id="reg-email" required autocomplete="off">
            </div>
            <div class="input-group">
                <label>Password</label>
                <input type="password" id="reg-password" required>
            </div>
            <button type="button" id="registerBtn" class="btn">Register</button>
        </form>
        <div class="link-text">
            Already have an account? <a href="login.html">Login here</a>
        </div>
    </div>
    
    <script>
        document.getElementById('registerBtn').addEventListener('click', async () => {
            const username = document.getElementById('reg-username').value;
            const email = document.getElementById('reg-email').value;
            const password = document.getElementById('reg-password').value;

            try {
                const response = await fetch('http://localhost:8080/api/auth/register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, email, password })
                });
                if (response.ok) {
                    alert('Register Successful! Please login.');
                    window.location.href = 'login.html';
                } else {
                    alert('Register failed. Username might be taken.');
                }
            } catch (err) {
                alert('Cannot connect to server.');
            }
        });
    </script>
</body>
</html>
